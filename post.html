<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post | Expertise Contábil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .post-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .post-header { margin-bottom: 32px; }
    .post-header .badge { margin-bottom: 12px; }
    .post-header h1 { font-size: clamp(28px, 4vw, 42px); margin: 16px 0; }
    .post-meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; }
    .post-content { font-size: 1.1rem; line-height: 1.8; color: var(--text); }
    .post-content img, .post-content video { max-width: 100%; border-radius: 12px; margin: 16px 0; }
    .post-content p { margin: 16px 0; }
    .post-media-section { margin: 24px 0; }
    .post-media-section img, .post-media-section video { max-width: 100%; border-radius: 12px; cursor: pointer; }
    .post-media-section audio { width: 100%; margin: 8px 0; }
    .back-link { display: inline-block; margin-top: 32px; color: var(--navy); font-weight: 600; text-decoration: none; }
    .back-link:hover { color: var(--gold); }
    .loading, .error { text-align: center; padding: 80px 20px; color: var(--muted); }
    .error { color: #ef4444; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
    .lightbox.show { display: flex; }
    .lightbox img, .lightbox video { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none; }
  </style>
</head>
<body>
  <header class="topbar" id="topo">
    <div class="container nav">
      <a href="/#inicio" class="brand" aria-label="Expertise Contábil - Governance & Compliance">
        <img class="brand-logo-img" src="/logo-expertise-contabil-ec-header-v2.png" alt="Logo Expertise Contábil - Governance & Compliance" />
        <span>
          <strong>Expertise Contábil</strong>
          <small>Governance & Compliance</small>
        </span>
      </a>
      <nav class="menu" id="menu">
        <a href="/">Início</a>
        <a href="/#blog">Blog</a>
        <a href="/#contato">Contato</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="post-container">
      <div id="postLoading" class="loading">Carregando post...</div>
      <div id="postError" class="error" style="display:none;"></div>
      <article id="postContent" style="display:none;"></article>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="copyright">© <span id="year"></span> Expertise Contábil. Todos os direitos reservados.</div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div id="lightboxContent"></div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug') || '';
    // Fallback: uses the working posts list endpoint + client-side filter
    const apiUrl = '/api/posts.php';

    async function loadPost() {
      const loadingEl = document.getElementById('postLoading');
      const errorEl = document.getElementById('postError');
      const contentEl = document.getElementById('postContent');

      if (!slug) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.innerHTML = '<p>Post não especificado.</p><a href="/#blog" class="back-link">← Voltar para o Blog</a>';
        return;
      }

      try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error('Erro ao carregar posts');
        const data = await res.json();
        const posts = data.posts || [];
        const post = posts.find(p => p.slug === slug);
        if (!post) throw new Error('Post não encontrado.');

        document.title = post.title + ' | Expertise Contábil';

        const typeLabels = { text: 'Artigo', image: 'Imagem', video: 'Vídeo', audio: 'Áudio', mixed: 'Conteúdo' };
        const date = new Date(post.created_at).toLocaleDateString('pt-BR', {
          day: '2-digit', month: 'long', year: 'numeric'
        });

        let mediaHtml = '';
        if (post.media && post.media.length > 0) {
          mediaHtml = '<div class="post-media-section">';
          post.media.forEach(m => {
            if (m.media_type === 'image') {
              mediaHtml += `<img src="${m.file_url}" alt="${escapeHtml(m.file_name || '')}" onclick="openLightbox('${m.file_url}','image')" loading="lazy" />`;
            } else if (m.media_type === 'video') {
              mediaHtml += `<video src="${m.file_url}" controls></video>`;
            } else if (m.media_type === 'audio') {
              mediaHtml += `<audio src="${m.file_url}" controls></audio>`;
            }
          });
          mediaHtml += '</div>';
        }

        if (post.thumbnail_url && (!post.media || post.media.length === 0)) {
          mediaHtml = `<div class="post-media-section"><img src="${post.thumbnail_url}" alt="Thumbnail" onclick="openLightbox('${post.thumbnail_url}','image')" /></div>`;
        }

        contentEl.innerHTML = `
          <div class="post-header">
            <span class="section-kicker">${typeLabels[post.post_type] || 'Artigo'}</span>
            <h1>${escapeHtml(post.title)}</h1>
            <div class="post-meta">
              <span>${date}</span>
              ${post.author_name ? `<span>Por ${escapeHtml(post.author_name)}</span>` : ''}
            </div>
          </div>
          ${mediaHtml}
          <div class="post-content">${post.content || ''}</div>
          <a href="/#blog" class="back-link">← Voltar para o Blog</a>
        `;

        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.innerHTML = `<p>${escapeHtml(err.message)}</p><a href="/#blog" class="back-link">← Voltar para o Blog</a>`;
      }
    }

    function openLightbox(url, type) {
      const lb = document.getElementById('lightbox');
      const lbContent = document.getElementById('lightboxContent');
      if (type === 'image') {
        lbContent.innerHTML = `<img src="${url}" alt="Visualização ampliada" />`;
      } else {
        lbContent.innerHTML = `<video src="${url}" controls autoplay></video>`;
      }
      lb.classList.add('show');
    }

    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.remove('show');
      document.getElementById('lightboxContent').innerHTML = '';
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    function escapeHtml(text) {
      const map = { '&': '&', '<': '<', '>': '>', '"': '"', "'": '&#039;' };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    loadPost();
  </script>
</body>
</html>
